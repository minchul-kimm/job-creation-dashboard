<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>접근 처리 결과</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f5f5f5;
    }
    .card {
      background: #fff; border-radius: 20px; padding: 48px 40px;
      text-align: center; box-shadow: 0 4px 32px rgba(0,0,0,.10);
      max-width: 420px; width: 90%;
    }
    .icon { font-size: 52px; margin-bottom: 20px; }
    h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 12px; }
    p  { color: #555; line-height: 1.7; font-size: 15px; }
    .btn {
      display: inline-block; margin-top: 28px; padding: 12px 28px;
      background: #FF6B35; color: #fff; text-decoration: none;
      border-radius: 10px; font-weight: 600; font-size: 15px;
    }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="icon" id="icon"></div>
  <h1 id="title"></h1>
  <p id="msg"></p>
</div>
<script>
  const p = new URLSearchParams(location.search);
  const status = p.get('status');
  const name   = p.get('name') || '';
  const appUrl = p.get('app') || '/';

  const map = {
    approved: {
      icon: '✅',
      title: '승인 완료',
      msg: `${name ? name + ' 님의 ' : ''}접근이 승인되었습니다.<br>신청자에게 승인 이메일이 발송되었습니다.`,
      btn: true,
    },
    rejected: {
      icon: '❌',
      title: '거절 처리 완료',
      msg: `${name ? name + ' 님의 ' : ''}신청이 거절되었습니다.`,
      btn: false,
    },
    already: {
      icon: 'ℹ️',
      title: '이미 처리된 신청',
      msg: '이미 처리된 신청입니다.',
      btn: false,
    },
    error: {
      icon: '⚠️',
      title: '오류',
      msg: p.get('msg') || '처리 중 오류가 발생했습니다.',
      btn: false,
    },
  };

  const info = map[status] || map.error;
  document.getElementById('icon').textContent  = info.icon;
  document.getElementById('title').textContent = info.title;
  document.getElementById('msg').innerHTML     = info.msg;
  if (info.btn) {
    const a = document.createElement('a');
    a.href = appUrl; a.className = 'btn'; a.textContent = '대시보드 바로가기';
    document.getElementById('card').appendChild(a);
  }
</script>
</body>
</html>
